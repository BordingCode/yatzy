<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#5C3A1E">
<title>Yatzy a la Bording</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/dice.css">
<link rel="stylesheet" href="css/scorecard.css">
</head>
<body>

<!-- START SCREEN -->
<div class="screen active" id="startScreen">
  <div class="start-title">Yatzy</div>
  <div class="start-subtitle">a la Bording</div>
  <div class="start-box">
    <label>Antal spillere</label>
    <select id="playerCount">
      <option value="1">1 spiller</option>
      <option value="2" selected>2 spillere</option>
      <option value="3">3 spillere</option>
      <option value="4">4 spillere</option>
    </select>
    <div class="player-inputs" id="playerInputs"></div>
    <button class="btn btn-brass" id="startBtn">Start spil</button>
  </div>
  <div class="highscore-box" id="startHighscores"></div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="top-bar">
    <div class="player-tabs" id="playerTabs"></div>
    <div class="top-bar-right">
      <span class="turn-info" id="turnInfo"></span>
      <button class="icon-btn" id="undoBtn" title="Fortryd" disabled>&#x21A9;</button>
      <button class="icon-btn" id="soundBtn" title="Lyd">&#x1F50A;</button>
    </div>
  </div>
  <div class="dice-area felt-bg">
    <div class="dice-row" id="diceRow"></div>
    <button class="roll-btn" id="rollBtn">Rul</button>
  </div>
  <div class="scorecard-wrap felt-bg">
    <table class="scorecard" id="scorecard"></table>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen" id="endScreen">
  <div class="end-title">Spillet er slut</div>
  <div class="end-subtitle" id="endSubtitle"></div>
  <div class="end-scores" id="endScores"></div>
  <div class="end-btns">
    <button class="btn btn-brass" id="playAgainBtn">Spil igen</button>
  </div>
  <div class="highscore-box" id="endHighscores"></div>
</div>

<script src="js/game.js"></script>
<script src="js/undo.js"></script>
<script src="js/dice.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
