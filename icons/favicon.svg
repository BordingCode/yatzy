<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5C3A1E"/>
    </linearGradient>
    <linearGradient id="dice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EBE0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#wood)"/>
  <!-- Die body -->
  <rect x="126" y="126" width="260" height="260" rx="36" fill="url(#dice)" stroke="#D0C8B8" stroke-width="6"/>
  <!-- Pips (showing 5) -->
  <circle cx="196" cy="196" r="24" fill="#2C2C2C"/>
  <circle cx="316" cy="196" r="24" fill="#2C2C2C"/>
  <circle cx="256" cy="256" r="24" fill="#2C2C2C"/>
  <circle cx="196" cy="316" r="24" fill="#2C2C2C"/>
  <circle cx="316" cy="316" r="24" fill="#2C2C2C"/>
</svg>
